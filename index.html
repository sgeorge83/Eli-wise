<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="ELI-WISE — Your intelligent AI assistant">
<title>ELI-WISE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #f8fafc;
    --bg-secondary: #ffffff;
    --bg-tertiary: #f1f5f9;
    --bg-input: #ffffff;
    --text-primary: #0f172a;
    --text-secondary: #64748b;
    --text-muted: #94a3b8;
    --border: #e2e8f0;
    --accent: #6366f1;
    --accent-hover: #4f46e5;
    --accent-light: rgba(99, 102, 241, 0.12);
    --user-bubble: #6366f1;
    --user-text: #ffffff;
    --eli-bubble: #ffffff;
    --eli-text: #1e293b;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
    --radius: 16px;
    --radius-sm: 10px;
    --header-height: 64px;
    --input-height: auto;
    --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  [data-theme="dark"] {
    --bg-primary: #0f172a;
    --bg-secondary: #1e293b;
    --bg-tertiary: #334155;
    --bg-input: #1e293b;
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --border: #334155;
    --accent: #818cf8;
    --accent-hover: #a5b4fc;
    --accent-light: rgba(129, 140, 248, 0.15);
    --user-bubble: #6366f1;
    --user-text: #ffffff;
    --eli-bubble: #1e293b;
    --eli-text: #e2e8f0;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
    --shadow-lg: 0 8px 30px rgba(0,0,0,0.4);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { height: 100%; }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    transition: background var(--transition), color var(--transition);
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100%;
    max-width: 900px;
    margin: 0 auto;
    position: relative;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: var(--header-height);
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
    transition: background var(--transition), border-color var(--transition);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-icon {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 700;
    font-size: 14px;
    box-shadow: var(--shadow-md);
  }

  .brand-text h1 {
    font-size: 1.125rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.2;
  }

  .brand-text span {
    font-size: 0.75rem;
    color: var(--text-secondary);
    font-weight: 400;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .icon-btn {
    width: 40px;
    height: 40px;
    border: 1px solid var(--border);
    background: var(--bg-tertiary);
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    transition: all var(--transition);
  }

  .icon-btn:hover {
    background: var(--accent-light);
    color: var(--accent);
    border-color: var(--accent);
  }

  .icon-btn svg { width: 18px; height: 18px; }

  /* Chat area */
  .chat-container {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    scroll-behavior: smooth;
    position: relative;
  }

  .chat-container::-webkit-scrollbar { width: 6px; }
  .chat-container::-webkit-scrollbar-track { background: transparent; }
  .chat-container::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
  }

  #chat {
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-height: 100%;
  }

  /* Welcome screen */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 20px;
    flex: 1;
    animation: fadeIn 0.5s ease;
  }

  .welcome.hidden { display: none; }

  .welcome-icon {
    width: 72px;
    height: 72px;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
    box-shadow: var(--shadow-lg);
    animation: float 3s ease-in-out infinite;
  }

  .welcome-icon svg { width: 36px; height: 36px; color: white; }

  .welcome h2 {
    font-size: 1.75rem;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: -0.03em;
  }

  .welcome p {
    color: var(--text-secondary);
    font-size: 1rem;
    max-width: 420px;
    line-height: 1.6;
    margin-bottom: 32px;
  }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    max-width: 560px;
  }

  .suggestion-chip {
    padding: 10px 16px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 0.875rem;
    color: var(--text-primary);
    cursor: pointer;
    transition: all var(--transition);
    font-family: inherit;
  }

  .suggestion-chip:hover {
    background: var(--accent-light);
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }

  /* Messages */
  .message-row {
    display: flex;
    gap: 12px;
    margin: 12px 0;
    animation: slideUp 0.3s ease;
    max-width: 100%;
  }

  .message-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 600;
    margin-top: 4px;
  }

  .avatar.eli {
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    color: white;
  }

  .avatar.user {
    background: var(--bg-tertiary);
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }

  .message-content {
    display: flex;
    flex-direction: column;
    max-width: calc(100% - 48px);
    min-width: 0;
  }

  .message-row.user .message-content { align-items: flex-end; }

  .message-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  .message-row.user .message-meta { flex-direction: row-reverse; }

  .message-bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 0.9375rem;
    line-height: 1.6;
    word-wrap: break-word;
    overflow-wrap: break-word;
    position: relative;
    transition: background var(--transition);
  }

  .message-row.eli .message-bubble {
    background: var(--eli-bubble);
    color: var(--eli-text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    box-shadow: var(--shadow-sm);
  }

  .message-row.user .message-bubble {
    background: var(--user-bubble);
    color: var(--user-text);
    border-bottom-right-radius: 4px;
    box-shadow: var(--shadow-sm);
  }

  .message-bubble code {
    background: var(--accent-light);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.85em;
    font-family: 'Consolas', 'Monaco', monospace;
  }

  .message-bubble pre {
    background: var(--bg-tertiary);
    padding: 12px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 8px 0;
    font-size: 0.85em;
  }

  .message-bubble pre code {
    background: none;
    padding: 0;
  }

  .message-bubble strong { font-weight: 600; }
  .message-bubble a { color: var(--accent); text-decoration: underline; }

  .copy-btn {
    opacity: 0;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    padding: 2px;
    border-radius: 4px;
    transition: all var(--transition);
    display: flex;
    align-items: center;
  }

  .message-row:hover .copy-btn { opacity: 1; }
  .copy-btn:hover { color: var(--accent); background: var(--accent-light); }
  .copy-btn svg { width: 14px; height: 14px; }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    gap: 5px;
    padding: 4px 0;
    align-items: center;
    height: 24px;
  }

  .typing-indicator span {
    width: 8px;
    height: 8px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: bounce 1.4s infinite ease-in-out both;
  }

  .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
  .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

  /* Input area */
  .input-area {
    padding: 16px 20px 20px;
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    transition: background var(--transition), border-color var(--transition);
  }

  .input-wrapper {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 8px 8px 16px;
    transition: border-color var(--transition), box-shadow var(--transition);
  }

  .input-wrapper:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
  }

  .input-wrapper.disabled {
    opacity: 0.6;
    pointer-events: none;
  }

  #userInput {
    flex: 1;
    border: none;
    background: transparent;
    font-family: inherit;
    font-size: 0.9375rem;
    color: var(--text-primary);
    resize: none;
    outline: none;
    max-height: 150px;
    line-height: 1.5;
    padding: 6px 0;
  }

  #userInput::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 44px;
    height: 44px;
    border: none;
    background: var(--accent);
    color: white;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all var(--transition);
  }

  .send-btn:hover:not(:disabled) {
    background: var(--accent-hover);
    transform: scale(1.05);
  }

  .send-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  .send-btn svg { width: 20px; height: 20px; }

  .input-hint {
    text-align: center;
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 10px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg-secondary);
    color: var(--text-primary);
    padding: 12px 20px;
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--border);
    font-size: 0.875rem;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s ease;
    z-index: 100;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .toast.error { border-color: #ef4444; color: #ef4444; }

  /* Animations */
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  @media (max-width: 600px) {
    .header { padding: 0 12px; }
    #chat { padding: 16px 12px; }
    .input-area { padding: 12px; }
    .welcome h2 { font-size: 1.4rem; }
    .suggestions { gap: 8px; }
    .suggestion-chip { font-size: 0.8125rem; padding: 8px 14px; }
    .message-bubble { font-size: 0.875rem; }
  }
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="brand">
      <div class="brand-icon">EW</div>
      <div class="brand-text">
        <h1>ELI-WISE</h1>
        <span>AI Assistant</span>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="newChatBtn" title="New conversation" aria-label="New conversation">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 5v14M5 12h14"/>
        </svg>
      </button>
      <button class="icon-btn" id="themeToggle" title="Toggle theme" aria-label="Toggle theme">
        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        <svg class="moon-icon" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="chat-container" id="chatContainer">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <h2>How can I help you today?</h2>
      <p>I'm ELI-WISE, your AI assistant. Ask me anything — from quick questions to deep conversations.</p>
      <div class="suggestions" id="suggestions">
        <button class="suggestion-chip" data-prompt="What can you help me with?">What can you help me with?</button>
        <button class="suggestion-chip" data-prompt="Explain a complex topic simply">Explain a complex topic</button>
        <button class="suggestion-chip" data-prompt="Help me brainstorm ideas">Brainstorm ideas</button>
        <button class="suggestion-chip" data-prompt="Write a professional email">Write an email</button>
      </div>
    </div>
    <div id="chat"></div>
  </div>

  <footer class="input-area">
    <div class="input-wrapper" id="inputWrapper">
      <textarea id="userInput" placeholder="Message ELI-WISE..." rows="1" aria-label="Message input"></textarea>
      <button class="send-btn" id="sendBtn" disabled aria-label="Send message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
        </svg>
      </button>
    </div>
    <p class="input-hint">Press Enter to send · Shift+Enter for new line</p>
  </footer>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
const chatDiv = document.getElementById('chat');
const chatContainer = document.getElementById('chatContainer');
const inputField = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const inputWrapper = document.getElementById('inputWrapper');
const welcome = document.getElementById('welcome');
const toast = document.getElementById('toast');
const themeToggle = document.getElementById('themeToggle');
const newChatBtn = document.getElementById('newChatBtn');

let threadId = null;
let isLoading = false;

const SUGGESTIONS = [
  "What can you help me with?",
  "Explain a complex topic simply",
  "Help me brainstorm ideas",
  "Write a professional email"
];

// Theme
function initTheme() {
  const saved = localStorage.getItem('eli-wise-theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const theme = saved || (prefersDark ? 'dark' : 'light');
  setTheme(theme);
}

function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('eli-wise-theme', theme);
  const sun = themeToggle.querySelector('.sun-icon');
  const moon = themeToggle.querySelector('.moon-icon');
  sun.style.display = theme === 'dark' ? 'none' : 'block';
  moon.style.display = theme === 'dark' ? 'block' : 'none';
}

themeToggle.addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  setTheme(current === 'dark' ? 'light' : 'dark');
});

// Toast
function showToast(message, isError = false) {
  toast.textContent = message;
  toast.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// Markdown-lite renderer
function renderMarkdown(text) {
  let html = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  html = html.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  html = html.replace(/\n/g, '<br>');

  return html;
}

function formatTime(date = new Date()) {
  return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function hideWelcome() {
  if (!welcome.classList.contains('hidden')) {
    welcome.classList.add('hidden');
  }
}

function scrollToBottom() {
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

function autoResize() {
  inputField.style.height = 'auto';
  inputField.style.height = Math.min(inputField.scrollHeight, 150) + 'px';
}

function updateSendButton() {
  sendBtn.disabled = !inputField.value.trim() || isLoading;
}

function addMessage(text, sender) {
  hideWelcome();

  const row = document.createElement('div');
  row.className = `message-row ${sender}`;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${sender}`;
  avatar.textContent = sender === 'eli' ? 'EW' : 'You';

  const content = document.createElement('div');
  content.className = 'message-content';

  const meta = document.createElement('div');
  meta.className = 'message-meta';
  const time = document.createElement('span');
  time.textContent = formatTime();
  meta.appendChild(time);

  if (sender === 'eli') {
    const copyBtn = document.createElement('button');
    copyBtn.className = 'copy-btn';
    copyBtn.title = 'Copy';
    copyBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard'));
    });
    meta.appendChild(copyBtn);
  }

  const bubble = document.createElement('div');
  bubble.className = 'message-bubble';
  if (sender === 'eli') {
    bubble.innerHTML = renderMarkdown(text);
  } else {
    bubble.textContent = text;
  }

  content.appendChild(meta);
  content.appendChild(bubble);
  row.appendChild(avatar);
  row.appendChild(content);
  chatDiv.appendChild(row);
  scrollToBottom();

  return row;
}

function addTypingIndicator() {
  hideWelcome();

  const row = document.createElement('div');
  row.className = 'message-row eli';
  row.id = 'typingRow';

  const avatar = document.createElement('div');
  avatar.className = 'avatar eli';
  avatar.textContent = 'EW';

  const content = document.createElement('div');
  content.className = 'message-content';

  const bubble = document.createElement('div');
  bubble.className = 'message-bubble';
  bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

  content.appendChild(bubble);
  row.appendChild(avatar);
  row.appendChild(content);
  chatDiv.appendChild(row);
  scrollToBottom();

  return row;
}

function removeTypingIndicator() {
  const el = document.getElementById('typingRow');
  if (el) el.remove();
}

function setLoading(loading) {
  isLoading = loading;
  inputWrapper.classList.toggle('disabled', loading);
  updateSendButton();
}

async function sendMessage(text) {
  const message = (text || inputField.value).trim();
  if (!message || isLoading) return;

  addMessage(message, 'user');
  inputField.value = '';
  inputField.style.height = 'auto';
  updateSendButton();

  addTypingIndicator();
  setLoading(true);

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, threadId })
    });

    const data = await response.json();
    removeTypingIndicator();

    if (!response.ok) {
      addMessage(data.reply || 'Something went wrong. Please try again.', 'eli');
      showToast('Failed to get a response', true);
      return;
    }

    addMessage(data.reply, 'eli');
    if (data.threadId) threadId = data.threadId;

  } catch (err) {
    removeTypingIndicator();
    addMessage('Unable to connect. Please check your connection and try again.', 'eli');
    showToast('Connection error', true);
  } finally {
    setLoading(false);
    inputField.focus();
  }
}

function startNewChat() {
  threadId = null;
  chatDiv.innerHTML = '';
  welcome.classList.remove('hidden');
  inputField.value = '';
  inputField.style.height = 'auto';
  updateSendButton();
  inputField.focus();
  showToast('New conversation started');
}

// Event listeners
sendBtn.addEventListener('click', () => sendMessage());
newChatBtn.addEventListener('click', startNewChat);

inputField.addEventListener('input', () => {
  autoResize();
  updateSendButton();
});

inputField.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

document.getElementById('suggestions').addEventListener('click', (e) => {
  const chip = e.target.closest('.suggestion-chip');
  if (chip) sendMessage(chip.dataset.prompt);
});

// Init
initTheme();
updateSendButton();
inputField.focus();
</script>
</body>
</html>
